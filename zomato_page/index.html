<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon"
    href="https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Zomato_logo.png/220px-Zomato_logo.png" />
  <!-- font awesome icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
    integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- poppins font by google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet" />
    <title>Zomato page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class = "header_part">
        <header>
            <nav class = "header">
                <a href="#">get the app</a>
                <div class =  "nav_bar_menu">
                    <a href="#" class = "link_part">investor relations</a>
                    <a href="#" class = "link_part">add restaurant</a>
                    <a href="#" class = "link_part">log in</a>
                    <a href="#" class = "link_part">sign up</a>
                    <a href="#" class = "user_icon"><i class="fa-solid fa-user"></i></a>
                </div>           
            </nav>   
        </header>
        <div class = "search_part">
            <img src="../zomatologo.jpg" alt="zomato logo" class = "zomato_logo">
            <div class = "search_bar_part">
                <input type="text" placeholder="Location" class = "location_bar">
                <input type="text" placeholder="Search for restaurant, cuisine or a dish" class = "search_bar">
                
            </div>
        </div>   
    </section>
    <section class = "img_section">  
        <div class = "parent_container">
            <div class = "img_container">
                <img src="../img1.jpg" alt="img 1">
                <h2>Italian</h2>
            </div>
            <div class = "img_container">
                <img src="../img2.jpg" alt="img 2">
                <h2>Chinese</h2>
            </div>
            <div class = "img_container">
                <img src="../img3.jpg" alt="img 3">
                <h2>Indian</h2>
            </div>
            <div class = "img_container">
                <img src="../img4.jpg" alt="img 4">
                <h2>Fast Food</h2>
            </div>

        </div>
    </section>
</body>
</html>
